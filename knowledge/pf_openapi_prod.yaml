      description: Bad Request
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                description: |
                  Error message describing reason for error.
                example: 'Key error ''jobs'': invalid_uuid is not a valid uuid'
              reason:
                type: string
                enum:
                  - INVALID_REQUEST_BODY_STRUCTURE
                description: Error code
                example: INVALID_REQUEST_BODY_STRUCTURE
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            type: object
            properties:
              fault:
                type: object
                description: Fault Object
                properties:
                  status:
                    type: string
                    example: '401'
                  code:
                    type: string
                    example: '900903'
                  message:
                    type: string
                    example: Authentication Failure
                  description:
                    type: string
                    example: Access Token Expired
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                description: |
                  Error message describing reason for error.
                example: >-
                  The job: 249a35c1-3083-47f9-8f79-ae5a25c72a05 does not exist
                  or you are not authorized to use it.
              reason:
                type: string
                enum:
                  - INVALID_JOB_ID
                description: Error code
                example: INVALID_JOB_ID
    '404':
      description: |
        Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    '422':
      description: |
        Unprocessable Entity (WebDAV) (RFC 4918)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    '500':
      description: Internal Server Error
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                description: |
                  Internal Server Error
                example: Internal Server Error
