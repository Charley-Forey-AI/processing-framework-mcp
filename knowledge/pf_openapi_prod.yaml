        - Execution Schedules
      summary: List Execution Schedules
      operationId: get-execution-schedules
      description: |
        Gets Execution Schedule objects that the user has access to view.

        Access Level Requirement: **BASE**

        This route also supports the `.json` extension.
      parameters:
        - $ref: '#/components/parameters/per-page'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/procedure-uuid'
        - name: status
          in: query
          description: >-
            Filter schedules by status (ACTIVE, PAUSED, RETIRED, FINISHED,
            FAILED)
          schema:
            type: string
            enum:
              - ACTIVE
              - PAUSED
              - RETIRED
              - FINISHED
              - FAILED
        - $ref: '#/components/parameters/region'
        - $ref: '#/components/parameters/created-start'
        - $ref: '#/components/parameters/created-end'
        - $ref: '#/components/parameters/next-runtime-start'
        - $ref: '#/components/parameters/next-runtime-end'
        - $ref: '#/components/parameters/execution-schedule-sort-by'
      responses:
        '200':
          description: OK
          headers:
            tpaas-request-id:
              $ref: '#/components/headers/api-gateway-request-id'
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Execution-Schedule'
                  current_page:
                    type: integer
                    description: The current page number
                  per_page:
                    type: integer
                    description: Number of items per page
                  total_entries:
                    type: integer
                    description: Total number of execution schedules
                  total_pages:
                    type: integer
                    description: Total number of pages available
        '401':
          $ref: '#/components/responses/401'
  /api/execution_schedules/{execution-schedule-id}:
    get:
      tags:
        - Execution Schedules
      summary: Get an Execution Schedule by ID
      operationId: get-execution-schedule-by-id
      description: |
        Get Execution Schedule object by ID

        Access Level Requirement: **BASE**

        This route also supports the `.json` extension.
      parameters:
        - name: execution-schedule-id
          in: path
          required: true
          description: The unique identifier of the Execution Schedule to retrieve.
          schema:
            type: string
      responses:
        '200':
          description: OK
          headers:
            tpaas-request-id:
              $ref: '#/components/headers/api-gateway-request-id'
          content:
            application/json:
              schema:
                type: object
                properties:
                  execution_schedule:
                    $ref: '#/components/schemas/Execution-Schedule'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
    put:
      tags:
        - Execution Schedules
      summary: Update or Perform Action on an Execution Schedule
      operationId: update-execution-schedule
      description: >
        Update an existing Execution Schedule or perform an action on it based
        on the action parameter.

        Possible actions include:

        - retire: Retire the execution schedule, preventing it from creating new
        executions

        - pause: Temporarily pause the execution schedule

        - resume: Resume a paused execution schedule


        If no action is provided, this will update the execution schedule
        properties.


        Access Level Requirement: **BASE**


        This route also supports the `.json` extension.
      parameters:
        - name: execution-schedule-id
          in: path
          required: true
          description: >-
            The unique identifier of the Execution Schedule to update or perform
            an action on.
          schema:
            type: string
        - name: action
          in: query
          required: false
          description: >
            The action to perform on the execution schedule.

            If not provided, the request will update the execution schedule
            properties.
          schema:
            type: string
            enum:
              - retire
              - pause
              - resume
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                execution_schedule:
                  $ref: '#/components/schemas/Execution-Schedule'
              required:
                - execution_schedule
        required: false
        description: >
          The execution schedule properties to update. Not required when
          performing an action via the action parameter.
      responses:
        '200':
          description: OK
          headers:
            tpaas-request-id:
              $ref: '#/components/headers/api-gateway-request-id'
          content:
            application/json:
              schema:
                type: object
                properties:
                  execution_schedule:
                    $ref: '#/components/schemas/Execution-Schedule'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
components:
  securitySchemes:
    bearer_auth:
      type: http
      description: >
        Request authentication is handled via Trimble Identity (TID). To use the
        service, you must first request a JWT

        from TID. Once you have a valid JWT, it must be submitted as a Bearer
        Authentication header for all requests to

        the service. This is a temporary access token and must be regenerated
        periodically. For full instructions

        on using authentication, see the [Trimble Identity
        documentation](https://docs.trimblecloud.com/identity/).


        A temporary Access Token returned from Trimble Identity's `/oauth/token`
        endpoint. It should be included as a

        Bearer token in the `Authorization` header when dispatching a request to
        the service. For more information see

        [Trimble Identity
        documentation](https://docs.trimblecloud.com/identity/)
      scheme: bearer
      bearerFormat: JWT
  parameters:
    engine:
      name: engine
      in: query
      description: >
        Filters Operations by the engine name supplied in the query. The string
        supplied must match the engine field of one or

        more Operations for this to be an effective filter.
      schema:
        type: string
      example: TrimbleDataEngine
    deployment-identifier:
      name: deployment_identifier
      in: query
      required: false
      description: The unique identifier of a Deployment.
      schema:
        type: string
      example: example-deployment
    procedure-uuid:
      name: procedure_id
      in: query
      description: Returns resources that belong to the associated procedure id.
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
      example: f2a04a08-9a48-45d3-8ddb-d0b1cc40982a
    identifier:
      name: identifier
      in: query
      description: |
        Returns all resource(s) that match the provided identifier string.
      required: false
      schema:
        type: string
      example: crack_detection_testing
    status:
      name: status
      in: query
      description: >
        The status of a resource. Filters the list of returned results by those
        that have a status matching the supplied

        value.
      required: false
      style: form
      explode: true
      schema:
        type: string
      example: MUTABLE
    execution-status:
      name: execution_status
      in: query
      description: >
        The execution_status of a resource. Filters the list of returned
        resources by those that have an execution_status matching the supplied
        value.
      required: false
      style: form
      explode: true
      schema:
        type: string
      example: READY
    region:
      name: region
      in: query
      description: Filter results by Region name.
      required: false
      schema:
        type: string
        enum:
          - aws-us1
          - azure-us1
      example: aws-us1
    per-page:
      name: per_page
      in: query
      description: >
        Determines how many API Resources (Operations, Events, Executions,
        Procedures, etc.) are returned per page.

        The default is 5 and the maximum is 1000.
      required: false
      style: form
      explode: true
      schema:
        type: integer
        format: int32
      example: 50
    page:
      name: page
      in: query
      description: |
        Sets which page is returned.
      required: false
      style: form
      explode: true
      schema:
        type: integer
        format: int32
      example: 1
    operation-id:
      name: operation-id
      in: path
      required: true
      description: Unique ID of an Operation.
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
      example: f2a04a08-9a48-45d3-8ddb-d0b1cc40982a
    public:
      name: public
      in: query
      description: >
        Filters results by public status. If not supplied, or explicitly set to
        "true", published resources will be included

        in the search. If explicitly supplied as "false", published resources
        are omitted from results.
      required: false
      style: form
      explode: true
      schema:
        type: boolean
      example: true
    operation-uuid:
      name: operation_uuid
      in: query
      required: false
      description: Unique ID of an Operation.
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
      example: f2a04a08-9a48-45d3-8ddb-d0b1cc40982a
    procedure-id:
      name: procedure-id
      in: path
      required: true
      description: Unique ID of an Procedure.
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
      example: 8fad9689-c459-4fed-933a-acc5c3dec8bb
    procedure-view:
      name: view
      in: query
      description: >
        Passing a value of `definition` with this query parameter will return
        the POST contents used to initially create the procedure. This is useful
        for creating a new version of the procedure or to promote the procedure
        definition to a new environment.
      required: false
      explode: true
      schema:
        type: string
      example: definition
    execution-status-executions:
      name: execution_status
      in: query
      description: >
        The execution_status of a resource. Filters the list of returned
        resources by those that have an execution_status matching the supplied
        value.
      required: false
      style: form
      explode: true
      schema:
        type: string
      example: FINISHED | FAILED | EXECUTING | QUEUED | WAITING
    created-start:
      name: created_start
      in: query
      description: >
        Filter results that have a created_at time that is after the supplied
        value. The created_end parameter is an optional pairing with this
        filter.
      required: false
      style: form
      explode: true
      schema:
        type: string
      example: 2022/01/01 00:00:00
    created-end:
      name: created_end
      in: query
      description: >
        Filter results that have a created_at time that is before the supplied
        value. The created_end parameter must be accompanied by the
        created_start parameter
      required: false
      style: form
      explode: true
      schema:
        type: string
      example: 2022/12/01 00:00:00
    completed-start:
      name: completed_start
      in: query
      description: >
        Filter results that have a completed_at time that is after the supplied
        value. The completed_end parameter is an optional pairing with this
        filter.
      required: false
      style: form
      explode: true
      schema:
        type: string
      example: 2022/01/01 00:00:00
    completed-end:
      name: completed_end
      in: query
      description: >
        Filter results that have a completed_at time that is before the supplied
        value. The completed_end parameter must be accompanied by the
        completed_start parameter
      required: false
      style: form
      explode: true
      schema:
        type: string
      example: 2022/12/01 00:00:00
    sort-by:
      name: sort_by
      in: query
      description: >
        Sort results by created_at or completed_at, ascending(+) or
        descending(-). Note: the '+' sign must be url encoded as '%2B' to be
        interpreted correctly.
      required: false
      style: form
      explode: true
      schema:
        type: string
      example: '-completed_at | +completed_at | -created_at | +created_at'
    execution-id:
      name: execution-id
      in: path
      required: true
      description: Unique ID of an Execution.
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
      example: 79cb4260-668a-4be5-adf3-5930d1d164e0
    details:
      name: details
      description: >
        Boolean to determine if the Execution response contains the underlying
        Procedure definition. The default is false.

        This parameter is restricted to `BACKEND` access level only.
      in: query
      required: false
      schema:
        type: boolean
    owner:
      name: owner
      in: query
      description: >
        Filters a resource based on the Owner name. Typically, this will be an
        Application name.
      schema:
        type: string
      example: DemoDocsApp
    engine-status:
      name: status
      in: query
      description: >
        The status of an Engine. Filters the list of returned results by those
        that have a status matching the supplied

        value.
      required: false
      style: form
      explode: true
      schema:
        type: string
        enum:
          - SUBMITTED
          - PREPARING
          - AVAILABLE
          - RETIRING
          - RETIRED
          - FAILED
      example: AVAILABLE
    os:
      name: os
      in: query
      description: |
        Filters a resource based on the Operating System name.
      schema:
        type: string
        enum:
          - linux
          - windows
      example: linux
    engine-id:
      name: engine-id
      in: path
      required: true
      description: The unique ID of an Engine.
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
      example: 79cb4260-668a-4be5-adf3-5930d1d164e0
    deployment-status:
      name: status
      in: query
      description: >
        The status of a Deployment. Filters the list of returned results by
        those that have a status matching the supplied

        value.
      required: false
      style: form
      explode: true
      schema:
        type: string
        enum:
          - SUBMITTED
          - PREPARING
          - UPDATING
          - AVAILABLE
          - RETIRING
          - RETIRED
          - FAILED
          - DELETING
      example: PREPARING
    active-engine:
      name: active_engine
      in: query
      required: false
      description: The unique ID of a desired Engine.
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
      example: 79cb4260-668a-4be5-adf3-5930d1d164e0
    deployment-id:
      name: deployment-id
      in: path
      required: true
      description: The unique ID of an Deployment.
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
      example: 79cb4260-668a-4be5-adf3-5930d1d164e0
    deployment-secret-id:
      name: deployment-secret-id
      in: path
      required: true
      description: The unique ID of a Deployment Secret.
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
      example: 79cb4260-668a-4be5-adf3-5930d1d164e0
    workspace-status:
      name: status
      in: query
      description: >
        The status of a resource. Filters the list of returned results by those
        that have a status matching the supplied

        value.
      required: false
      style: form
      explode: true
      schema:
        type: string
      example: AVAILABLE
    workspace-id:
      name: workspace-id
      in: path
      required: true
      description: The unique ID of a Workspace.
      schema:
        type: string
        format: uuid
        minLength: 36
        maxLength: 36
      example: 3fd88600-e686-47a1-98f8-5652a7759939
    workspace-action:
      name: action
      in: query
      description: >
        The action to perform on the Workspace Operation value.

        If none is given, the request body is used to update the value. 

        If the action is `approve`, the Operation resource is created based on
        the value.
      required: false
      style: form
      explode: true
      schema:
        type: string
        enum:
          - approve
      example: approve
    next-runtime-start:
      name: next_runtime_start
      in: query
      description: >
        Filter schedules that have a next runtime that is after the supplied
        value.
      required: false
      style: form
      explode: true
      schema:
        type: string
      example: 2022/01/01 00:00:00
    next-runtime-end:
      name: next_runtime_end
      in: query
      description: >
        Filter schedules that have a next runtime that is before the supplied
        value.
      required: false
      style: form
      explode: true
      schema:
        type: string
      example: 2022/12/01 00:00:00
    execution-schedule-sort-by:
      name: sort_by
      in: query
      description: >
        Sort execution schedules by created_at or next_runtime, ascending(+) or
        descending(-). Note: the '+' sign must be url encoded as '%2B' to be
        interpreted correctly.
      required: false
      style: form
      explode: true
      schema:
        type: string
      example: '-next_runtime | +next_runtime | -created_at | +created_at'
    view:
      name: view
      in: query
      description: >
        If this parameter is set to 'spec', retrieve the property sets of a
        Deployment for each region.
      required: false
      style: form
      explode: true
      schema:
        type: string
      example: spec
  headers:
    api-gateway-request-id:
      description: |
        API Cloud Request ID using header value `tpaas-request-id`.
      schema:
        type: string
      example: rrt-0bd41fd67a18a709d-d-ea-32558-6500842-1
  schemas:
    Operation-Input-Parameter:
      type: object
      description: |
        Identifier of the parameter as defined in the Operation.
      required:
        - type
        - optional
      properties:
        type:
          type: string
          enum:
            - string
            - single_choice
            - boolean
            - array
            - object
            - number
          description: |
            Data type of the parameter.
              - `string` - String text surrounded by double quotes
              - `single_choice` - Value must match an item in the _options_ field
              - `boolean` - Boolean true/false (not surrounded by quotes)
              - `array` - A list of parameters of any type
              - `object` - Any valid JSON object
              - `number` - An integer or a float
        description:
          type: string
          description: >
            Descriptive text for the input parameter. The description should
            inform users of the meaning and context

            of the parameter so they can supply correct values.
        name:
          type: string
          description: |
            Human-readable name for the parameter.
        optional:
          type: boolean
          enum:
            - true
            - false
          description: >
            Describes whether the parameter is required or optional. Defaults to
            false (Required).
        encrypted:
          type: boolean
          enum:
            - true
            - false
          description: >
            Indicates that the parameter contains sensitive information.

            This selction will cascade to the Procedure's mapped parameter, and
            encrypt

            the value submitted in an Execution. Defaults to false. 

            **NOTE** The raw value will be supplied to an Engine while
            executing.
      example:
        type: string
        description: The Dropbox access token used to download the file
        name: Dropbox Access Token
        optional: true
        encrypted: false
    Operation-Output-Parameter:
      type: object
      description: |
        Identifier of the output parameter as defined in Operation.
      required:
        - type
        - optional
      properties:
        type:
          type: string
          enum:
            - string
            - single_choice
            - boolean
            - array
            - object
            - number
          description: |
            Data type of the output parameter.
              - `string` - String text surrounded by double quotes
              - `single_choice` - Value must match an item in the _options_ field
              - `boolean` - Boolean true/false (not surrounded by quotes)
              - `array` - A list of parameters of any type
              - `object` - Any valid JSON object
              - `number` - An integer or a float
        description:
          type: string
          description: |
            Descriptive text for the output parameter.
        name:
          type: string
          description: |
            Human readable name for the parameter.
        optional:
          type: boolean
          description: |
            Whether the parameter is optional or required.
      example:
        output_parameter_identifier:
          type: string
          description: a sample output parameter
          name: sample output parameter
          optional: false
    Operation:
      type: object
      properties:
        id:
          readOnly: true
          type: string
          description: >
            The unique identifier for the Operation, read-only and assigned at
            creation time. Used to perform actions on

            specific Operations through the API.
        identifier:
          type: string
          description: >
            Unique identifier string for the Operation. Usually named in a way
            that is descriptive of the purpose of the

            Operation, less human-readable than the **name** field. Must be
            between 8 to 256 characters, start with a letter,

            and can contain only lowercase letters, numbers, underscores, and
            hyphens.
          example: dataocean_read
        version:
          type: integer
          description: >
            The version of the Operation. Operations can be versioned to
            facilitate lifecycle events of engines and

            Procedures. The Operation's identifier/name is used as a unique key
            to discover all versions of an Operation.
        regions:
          type: array
          items:
            type: string
          description: >
            Allowable locations that a particular Operation can run in. Regions
            are a combination of two key pieces of

            information - the Cloud Provider and the specific region from that
            Provider. All regions ending with `-1**`

            represents regions within AWS, while values ending with `-2**`
            represent Azure.
        public:
          readOnly: true
          type: boolean
          description: >
            The state of the Operation's publication. If true, the Operation is
            available for public use. This is not unlike

            sharing it with every other User in the system. If this field is
            false, then it follows the normal rules with

            regard to sharing and individual ownership.
        status:
          readOnly: true
          type: string
          enum:
            - MUTABLE
            - EXECUTABLE
            - RETIRED
          description: >
            The status of an Operation describes its lifecycle as follows.

            - `MUTABLE` - The Operation is new and can still be altered.

            - `EXECUTABLE` - The Operation is ready to be executed and can no
            longer be altered. The Operation has been put

            into a non-mutable state to eliminate the possibility of introducing
            breaking changes to an in-use Operation.

            - `RETIRED` - Operation has been retired from service and can no
            longer be executed.
        execution_status:
          readOnly: true
          type: string
          enum:
            - NOT_READY
            - READY
            - SUSPENDED
          description: >
            The execution status of the Operation.

            - `NOT_READY` - This Operation cannot be used to create any
            Procedures and thus cannot be part of an execution.

            - `READY` - This Operation can now by used to create Procedures and
            thus be part of executions.

            - `SUSPENDED` - The processing of this Operation has been suspended
            and cannot be part of executions.
        owner_name:
          readOnly: true
          type: string
          description: >
            The owner name maps to the API Cloud application used to originally
            create the Operation. Contact the owner of the

            Operation to share or publish this Operation if needed.
        name:
          type: string
          nullable: true
          description: |
            Human-readable name of the Operation.
        description:
          type: string
          nullable: true
          description: |
            A description of an Operation and its function.
        engine_name:
          type: string
          description: >
            The name of the backend engine that supports this Operation.
            `LEGACY` is used for Engine's that have already been

            established in the system prior to the creation of the Engines APIs.
        deployment_identifier:
          type: string
          description: >
            The identifier of the Deployment that supports this Operation. The
            Deployment is the abstraction layer that

            accommodates the ability to create a new Engine and expose it
            through a Deployment so there is no need to change

            existing Operations and Procedures.
        created_at:
          readOnly: true
          type: string
          description: |
            Timestamp for the Operation's creation.
        shared_with:
          type: array
          items:
            type: string
          description: >
            List of names of Users with whom this Operation has been shared. By
            default, only the User who created the

            Operation has access. Note: As with any other attribute, the value
            is set according to the value supplied. Sending

            an array with a single User's name will not append that User's name
            to the already existing list, but will instead

            replace it.
        parameters:
          type: object
          description: >
            A list of parameter objects attached to the Operation. Parameters
            define options and arguments supplied to the

            Operation.
          additionalProperties:
            $ref: '#/components/schemas/Operation-Input-Parameter'
        output_parameters:
          type: object
          description: >
            A list of parameter objects that define values to be output from an
            Operation.
          additionalProperties:
            $ref: '#/components/schemas/Operation-Output-Parameter'
        inputs:
          type: object
          description: >
            Named inputs for the Operation. This is an object containing one or
            more inputs that describe the data types which

            will be accepted as input to the Operation.
          properties:
            input_identifier:
              required:
                - data_types
                - optional
              type: object
              properties:
                name:
                  type: string
                  description: |
                    Human readable name of the input.
                description:
                  type: string
                  description: |
                    Descriptive text for the input type.
                data_types:
                  type: array
                  items:
                    type: string
                  description: |
                    List of accepted input data types.
                optional:
                  type: boolean
                  description: |
                    Whether the input file is optional or not.
              example:
                name: first input
                description: Anything goes
                data_types:
                  - '*'
                optional: false
        outputs:
          type: object
          description: >
            Named outputs for the Operation. This is an object containing one or
            more outputs that emit data. Each such output

            specifies a single output data type.
          properties:
            output_identifier:
              type: object
              required:
                - data_type
              description: identifier of the output as defined in the Operation.
              properties:
                data_type:
                  type: string
                  description: |
                    Type of data output from the Operation.
                description:
                  type: string
                  description: |
                    Descriptive text for the output and its type.
                name:
                  type: string
                  description: |
                    Human readable name of the output.
              example:
                data_type: '*'
                description: this output is x
                name: first output port
        dynamic_output:
          type: boolean
          nullable: false
          description: >
            Indicates whether or not the Output content is considered dynamic or
            not. In all cases except for the Switcher

            Operation, this will be `false`. This value may only be set by an
            admin User.
        deprecation_message:
          type: string
          nullable: true
          description: |
            Optional string parameter.
        retired_after:
          type: string
          nullable: true
          description: |
            Optional string parameter.
    get-operations:
      type: object
      properties:
        items:
          type: array
          description: |
            The Operations in the response.
          items:
            $ref: '#/components/schemas/Operation'
        current_page:
          type: integer
          description: |
            Current page of the Operations object list.
        per_page:
          type: integer
          description: |
            Number of Operation objects returned per page.
        total_entries:
          type: integer
          description: >
            Total number of Operation objects that the requesting user has
            access to.
        total_pages:
          type: integer
          description: >
            Total pages of the Operation objects list. Calculated by dividing
            **total_entries** by **per_page**.
    create-operation:
      type: object
      properties:
        operation:
          type: object
          description: |
            The Operation that is created.
          allOf:
            - $ref: '#/components/schemas/Operation'
            - required:
                - identifier
                - version
                - deployment_identifier
      required:
        - operation
    created-operation:
      type: object
      properties:
        operation:
          type: object
          description: |
            The Operation that is created.
          allOf:
            - $ref: '#/components/schemas/Operation'
    Error:
      type: object
      properties:
        message:
          type: string
          description: |
            The error message.
    get-operation:
      allOf:
        - $ref: '#/components/schemas/created-operation'
    update-operation:
      type: object
      properties:
        operation:
          type: object
          description: |
            The Operation that is to be updated.
          allOf:
            - $ref: '#/components/schemas/Operation'
      required:
        - operation
    updated-operation:
      allOf:
        - $ref: '#/components/schemas/created-operation'
        - $ref: '#/components/schemas/update-operation'
        - example:
            status: CREATING
            updated_at: '2021-01-01 12:00:00'
    Procedure-Minimal:
      type: object
      properties:
        id:
          readOnly: true
          type: string
          description: >
            The unique identifier for the Procedure, read-only and assigned at
            creation time. Used to perform actions on

            specific Procedures through the API.
        owner_name:
          readOnly: true
          type: string
          description: >
            The owner name maps to the API Cloud application used to originally
            create the procedure. Contact the owner of the

            procedure to share or publish this procedure if needed.
        identifier:
          type: string
          description: >
            Unique identifier string for the Procedure. Usually named in a way
            that is descriptive of the purpose of the

            Procedure, less human-readable than the name field. Must be between
            8 to 256 characters, start with a letter,

            and can contain only lowercase letters, numbers, underscores, and
            hyphens.
        version:
          type: integer
          description: >
            The version of the Procedure. Procedures can be versioned to
            facilitate lifecycle events of engines and

            procedures. The Procedure's identifier/name is used as a unique key
            to discover all versions of a Procedure.
        name:
          type: string
          description: |
            Human-readable name of the Procedure.
        description:
          type: string
          description: |
            A description of a Procedure and its function.
        tags:
          type: string
          description: |
            List of tags (as strings) associated with the Procedure.
          nullable: true
        documentation_url:
          type: string
          description: |
            Optional URL to reference external documentation for the Procedure.
          nullable: true
        shared_with:
          type: array
          items:
            type: string
          description: >
            List of names of Users with whom this Procedure has been shared. By
            default, only the User who created the

            Procedure has access. Note: As with any other attribute, the value
            is set according to the value supplied. Sending

            an array with a single User's name will not append that User's name
            to the already existing list, but will instead

            replace it.
        regions:
          type: array
          items:
            type: string
          readOnly: true
          description: >
            List of Region names in which every Procedure of this Procedure can
            run in, and therefore the Procedure can run

            in. Generated on creation or update. All Procedures in a Procedure
            must share at least one common Region.
        default_region:
          type: string
          description: >
            Region name the Procedure should execute in by default. Must be a
            common Region shared between given Procedures. A

            Procedure can be executed in any of the available Regions, but will
            use `default_region` if no Region is chosen.

            Can be updated after Procedure is approved.
        status:
          readOnly: true
          type: string
          enum:
            - MUTABLE
            - EXECUTABLE
            - RETIRED
          description: >
            The status of an Procedure describes its lifecycle as follows.

            - `MUTABLE` - The Procedure is new and can still be altered.

            - `EXECUTABLE` - The Procedure is ready to be executed and can no
            longer be altered. The Procedure has been put

            into a non-mutable state to eliminate the possibility of introducing
            breaking changes to an in-use Procedure.

            - `RETIRED` - Procedure has been retired from service and can no
            longer be executed.
        execution_status:
          readOnly: true
          type: string
          enum:
            - NOT_READY
            - READY
            - SUSPENDED
          description: >
            The execution status of the Procedure.

            - `NOT_READY` - This Procedure cannot be used to create any
            procedures and thus cannot be part of an Execution.

            - `READY` - This Procedure can now by used to create procedures and
            thus be part of Executions.

            - `SUSPENDED` - The processing of this Procedure has been suspended
            and cannot be part of Executions.
        created_at:
          readOnly: true
          type: string
          description: |
            Timestamp for the Procedure's creation.
        retired_after:
          readOnly: true
          type: string
          nullable: true
          description: |
            Optional string parameter.
        public:
          readOnly: true
          type: boolean
          description: >
            The state of the Procedure's publication. If true, the Procedure is
            available for public use. This is not unlike

            sharing it with every other User in the system. If this field is
            false, then it follows the normal rules with

            regard to sharing and individual ownership.
    get-procedures:
      type: object
      properties:
        items:
          type: array
          description: |
            The Procedures in the response.
          items:
            $ref: '#/components/schemas/Procedure-Minimal'
        current_page:
          type: integer
          description: |
            Current page of the Procedures object list.
        per_page:
          type: integer
          description: |
            Number of Procedure objects returned per page.
        total_entries:
          type: integer
          description: >
            Total number of Procedure objects that the requesting user has
            access to.
        total_pages:
          type: integer
          description: >
            Total pages of the Procedure objects list. Calculated by dividing
            **total_entries** by **per_page**.
    Procedure-Operation:
      type: object
      required:
        - identifier
        - version
      properties:
        identifier:
          type: string
          description: >
            Unique identifier string for the operation. Usually named in a way
            that is descriptive of the purpose of the

            operation, less human-readable than the name field.
        id:
          readOnly: true
          type: string
          description: >
            The unique identifier for the Operation, read-only and assigned at
            creation time. Used to perform actions on

            specific Operations through the API.
        version:
          type: integer
          description: >
            The version of the Operation. Operations can be versioned to
            facilitate lifecycle events of engines and

            procedures. The Operation's identifier/name is used as a unique key
            to discover all versions of an Operation.
        engine_name:
          type: string
          description: The name of the backend engine that supports this operation.
        encrypted_parameters:
          readOnly: true
          type: array
          items:
            type: string
          description: 'List of Operation parameters defined with `encrypted: true`'
        parameters:
          type: object
          description: >-
            Parameters for the Operation. Each Operation can have 0 or more
            parameters.
          additionalProperties:
            description: Wrapper for the parameters for the Operation.
            type: object
            required:
              - source
            properties:
              source:
                type: string
                description: >
                  The source of the Operation parameter. The source could be a
                  Procedure parameter input by the

                  user or another Operation's output parameter.
              optional:
                type: boolean
                description: |
                  Whether the parameter is optional or required.
        inputs:
          type: object
          description: >
            Named inputs for the Operation. This is an object containing 0 or
            more inputs that describe the source of the

            input data.
          additionalProperties:
            description: |
              Array wrapper for the source of an Operation's input.
            type: object
            required:
              - sources
            properties:
              sources:
                type: array
                items:
                  type: string
                description: >
                  Used to chain the output of one Operation into the input of
                  another Operation.
              data_types:
                type: string
                description: |
                  Type of data output from the Operation.
        outputs:
          type: object
          description: >
            A Procedure Operation does **not** require Output Ports to be
            defined in the Procedure definition *except* for the

            case when a Switcher Operation is being utilized. If no Switcher is
            being specified, then no Operation Output

            Ports should be defined.
          additionalProperties:
            type: object
            required:
              - data_type
            description: |
              identifier of the output as defined in the Operation.
            properties:
              data_type:
                type: string
                description: |
                  Type of data output from the Operation.
              description:
                type: string
                description: |
                  Descriptive text for the output and its type.
              name:
                type: string
                description: |
                  Human readable name of the output.
        output_parameters:
          type: object
          description: >
            A list of parameter objects that define values to be output from an
            Operation.
          additionalProperties:
            required:
              - type
              - optional
            type: object
            description: |
              Identifier of the output parameter as defined in Operation.
            properties:
              type:
                type: string
                enum:
                  - string
                  - single_choice
                  - boolean
                  - array
                  - object
                description: >
                  Data type of the output parameter.

                  - `string` - String text surrounded by double quotes

                  - `single_choice` - Value must match an item in the _options_
                  field

                  - `boolean` - Boolean true/false (not surrounded by quotes)

                  - `array` - A list of parameters of any type

                  - `object` - Any valid JSON object
              description:
                type: string
                description: |
                  Descriptive text for the output parameter.
              name:
                type: string
                description: |
                  Human readable name for the parameter.
              optional:
                type: boolean
                description: |
                  Whether the parameter is optional or required.
        name:
          type: string
          description: Human-readable name of the Operation.
        description:
          type: string
          description: A description of an operation and its function.
    Procedure-Parameter:
      type: object
      properties:
        default_value:
          oneOf:
            - type: string
              nullable: true
            - type: boolean
          description: >
            The default value for the Procedure parameter. If no value is
            provided by the user then the default value is used

            instead.
        name:
