    Schedule-OneTime:
      type: object
      description: |
        Defines a one-time schedule for an execution to run at a specific time.
      properties:
        at_time:
          type: string
          format: date-time
          description: |
            The specific date and time when the execution should run.
            Expected format: "YYYY/MM/DD HH:MM:SS"
            Example: "2026/07/14 9:15:00"
      required:
        - at_time
      example:
        at_time: 2026/07/14 9:15:00
    Schedule-Recurring:
      type: object
      description: |
        Defines a recurring schedule for executions to run periodically.
      properties:
        cron_expression:
          type: string
          description: |
            A cron expression that defines the recurring schedule.
            Example: "0 */8 * * ? *" (every 8 hours)
        start_at:
          type: string
          format: date-time
          description: >
            Optional start date and time for when this recurring schedule should
            begin.

            If not provided, the schedule will start immediately after creation.

            Expected format: "YYYY/MM/DD HH:MM:SS"

            Example: "2025/02/01 11:03:04"
        end_at:
          type: string
          format: date-time
          description: >
            Optional end date and time for when this recurring schedule should
            terminate.

            If not provided, the schedule will continue indefinitely until
            manually expired.

            Expected format: "YYYY/MM/DD HH:MM:SS"

            Example: "2026/02/01 11:03:00"
      required:
        - cron_expression
      example:
        cron_expression: 0 */8 * * ? *
        start_at: 2025/02/01 11:03:04
        end_at: 2026/02/01 11:03:00
    Execution-Schedule:
      type: object
      properties:
        id:
          readOnly: true
          type: string
          description: >
            The unique identifier for the Execution Schedule, read-only and
            assigned at creation time. Used to perform actions on

            specific Execution Schedules through the API.
        procedure_id:
          type: string
          description: The unique identifier of the target Procedure.
        procedure_identifier:
          readOnly: true
          type: string
          description: The identifier of the target Procedure.
        procedure_version:
          readOnly: true
          type: integer
          description: The version number of the target Procedure.
        data_export:
          type: boolean
          description: >-
            Whether or not the execution's data will be available for export.
            Default to false.
          default: false
        region:
          type: string
          description: >
            Region name for the Execution to run in. Must be a name seen in the
            Procedure's `regions` list. If not provided,

            then `default_region` of the Procedure is used.
        parameters:
          type: object
          description: >
            Mapping of Procedure-specified parameter names to parameter values.
            This is where the user specifies Procedure

            specific parameter field names and values for the Execution.
          additionalProperties:
            $ref: '#/components/schemas/Execution-Parameter'
        schedule:
          type: object
          description: >
            Defines when the execution should be run. Can be a one-time schedule
            or a recurring schedule.
          oneOf:
            - $ref: '#/components/schemas/Schedule-OneTime'
            - $ref: '#/components/schemas/Schedule-Recurring'
        status:
          readOnly: true
          type: string
          enum:
            - ACTIVE
            - PAUSED
            - RETIRED
            - FINISHED
            - FAILED
          description: >
            The status of an Execution Schedule describes its lifecycle as
            follows:
                - `ACTIVE` Designates the Execution Schedule as active and able to trigger executions.
                - `PAUSED` Execution Schedule is inactive and will not trigger executions.
                - `RETIRED` Execution Schedule has been retired and can no longer trigger executions.
                - `FINISHED` Execution Schedule has completed all executions and is finished.
                - `FAILED` Execution Schedule has failed and cannot trigger further executions.
        created_at:
          readOnly: true
          type: string
          format: date-time
          description: |
            Timestamp for when the Execution Schedule was created.
        updated_at:
          readOnly: true
          type: string
          format: date-time
          description: |
            Timestamp for when the Execution Schedule was last updated.
        next_runtime:
          readOnly: true
          type: string
          format: date-time
          description: |
            Timestamp for when the next execution is scheduled to run.
        metadata:
          readOnly: true
          type: object
          description: |
            Additional metadata associated with the execution schedule.
        bound_parameters:
          readOnly: true
          type: object
          nullable: true
          description: >
            Bound parameters for the execution schedule, if any. This field will
            be null if no parameters are bound.
      required:
        - procedure_id
        - schedule
    get-deployment-internal:
      type: object
      properties:
        engine_version:
          type: object
          description: |
            The Engine Version internal view.
          properties:
            id:
              readOnly: true
              type: string
              description: >
                The unique identifier for the Engine Version, read-only and
                assigned at creation time. Used to perform actions on

                specific Engine Versions through the API.
            name:
              type: string
              description: |
                Engine Version name.
            owner:
              readOnly: true
              type: string
              description: |
                Engine Version owner.
            description:
              type: string
              description: |
                A description of the Engine and its function.
            status:
              readOnly: true
              type: string
              enum:
                - SUBMITTED
                - GENERATING_TOKEN
                - AWAITING_IMAGE_UPLOAD
                - PREPARING
                - AVAILABLE
                - FAILED
                - RETIRING
                - RETIRED
              description: >
                The status of an Engine Version describes its lifecycle as
                follows.

                - `SUBMITTED` - The Engine Version is new.

                - `PREPARING` - The Engine Version is waiting for a backend
                asynchronous process to complete.

                - `AVAILABLE` - The Engine Version is available for use.

                - `FAILED` - The Engine Version failed in a process and can not
                be used.

                - `RETIRING` - The Engine Version is being retired and can not
                be used.

                - `RETIRED` - The Engine Version has been retired and can no
                longer be used.

                - `GENERATING_TOKEN` - If `acr_token` was chosen as the
                ingestion_type, the Engine Version is waiting for the

                token to be generated. After the token is generated, the
                information will be given in container_upload

                - `AWAITING_IMAGE_UPLOAD` - The Engine Version is waiting for
                the Owner to upload their image using the information

                given in `container_upload`.
            public:
              type: boolean
              description: >
                The state of the Engine Version's publication. If true, the
                Version is available for public use. This is not

                unlike sharing it with every other User in the system. If this
                field is false, then it follows the normal rules

                with regard to sharing and individual ownership.
            tag:
              type: string
              description: >
                A tag unique to the Engine the Version belongs to. Must be
                between 1 to 75 characters long, and contain alphanumeric

                values only (a-z, A-Z, 0-9).
            memory:
              type: integer
              description: >
                The amount of memory, in megabytes (mb), allocated to the Engine
                Version. Defaults to 1024 mb.
            cpu:
              type: number
              description: >
                The amount of CPU allocated to the Engine Version. Defaults to
                0.5.
            env_vars:
              type: array
              description: >
                Environment variables that are stored directly on the Engine
                Version's Engine Spec as plain-text values.
              items:
                type: object
                properties:
                  value:
                    type: string
                    description: The value for this environment variable.
                  container_var_name:
                    type: string
                    description: >-
                      The name used to access this environment variable within
                      the container.
            min_instances:
              type: integer
              description: >
                The minimum number of instances that should run for this Engine
                Version. Defaults to 0.
            max_instances:
              type: integer
              description: >
                The maximum number of instances that should run for this Engine
                Version. Defaults to 1.
            regions:
              type: array
              items:
                type: string
              description: >
                The locations this Engine Version can run in. Regions are a
                combination of two key pieces of

                information - the Cloud Provider and the specific region from
                that Provider. All regions ending with `-1**`

                represents regions within AWS, while values ending with `-2**`
                represent Azure. Defaults to `["aws-us1"]`.
            ingestion_type:
              type: string
              enum:
                - acr_token
                - data_ocean
                - docker_hub
              description: >
                The method for the Engine Version image to be ingested into the
                service. Currently only `acr_token` is supported.

                Defaults to `acr_token`.

                - `acr_token` - Let the service generate an ACR token after
                creating an Engine Version. Once it's been generated, the

                necessary information for using the token to upload the Engine
                Version image will be specified in `container_upload`.
            container_upload:
              readOnly: true
              type: object
              description: >
                Initially empty, then updated by internal services. Contains
                information on how to upload a container.
              properties:
                acr_token:
                  type: object
                  description: |
                    Contains information relevant to an ACR upload token.
                  properties:
                    status:
                      type: string
                      enum:
                        - GENERATING
                        - AVAILABLE
                        - UNAVAILABLE
                        - IMAGE_RECEIVED
                      description: >
                        The status of an ACR token request describes its
                        lifecycle as follows.

                        - `GENERATING` - The ACR token has been requested and is
                        being generated.

                        - `AVAILABLE` - The ACR token is ready for use.

                        - `UNAVAILABLE` - The ACR token can not be used.

                        - `IMAGE_RECEIVED` - An image has been uploaded to ACR
                        using the token.
                    login_command:
                      type: string
                      description: >
                        The command to login to docker before tagging and
                        pushing an image. 
                    tag_command:
                      type: string
                      description: |
                        The command to run to correctly tag an image for upload.
                    push_command:
                      type: string
                      description: >
                        The command to run to correctly push an image after it
                        has been tagged.
            secret_variables:
              type: array
              items:
                type: object
                properties:
                  secret_name:
                    type: string
                    description: |
                      The name of the Secret to mount to this Engine Version.
                  container_var_name:
                    type: string
                    description: |
                      The name given to the env_var
            secret_files:
              type: array
              items:
                type: object
                properties:
                  secret_name:
                    type: string
                    description: |
                      The name of the Secret to mount to this Engine Version.
                  container_file_path:
                    type: string
                    description: |
                      The path to mount the file to on the Engine Version.
            created_at:
              readOnly: true
              type: string
              description: |
                Timestamp for the Engine Version's creation.
            updated_at:
              readOnly: true
              type: string
              description: |
                Timestamp for the Engine Version's latest update.
            container_image:
              type: object
              description: >
                Initially empty, then updated by internal services. Should only
                be accessible to internal services.

                Contains tasklist info and image URI.
              additionalProperties:
                type: object
                description: >
                  There will be a dictionary for each region available to this
                  Engine Version.
                properties:
                  image:
                    type: string
                    description: The URI for this image's location in this region.
                  task_list:
                    type: string
                    description: >-
                      The SWF tasklist that will direct work to the paired repo
                      in this region.
    get-deployment-crd:
      type: object
      additionalProperties:
        type: object
        description: >
          The region name should match a region available to this Engine
          Version. There will be a dictionary for each

          region available to this Engine Version.
        properties:
          job_specification:
            type: object
            description: |
              The Job Specification properties.
            properties:
              container_image:
                type: string
                description: The URI for this image's location in this region.
              engine_group:
                type: string
                description: The engine group of the corresponding Engine.
              swf_task_list:
                type: string
                description: >-
                  The SWF tasklist that will direct work to the paired repo in
                  this region.
              engine_category:
                type: string
                description: Same as swf_task_list.
              node_os:
                type: string
                description: The operating system of the corresponding Engine.
              windows_build:
                type: string
                nullable: true
                description: The os_build of the corresponding Engine.
              node_arch:
                type: string
                description: |
                  'amd64' is the only available arch at this time.
              memory_request:
                type: integer
                description: The memory of the Engine Version.
              memory_limit:
                type: integer
                nullable: true
                description: The memory limit.
              cpu_request:
                type: number
                description: The cpu of the Engine Version.
              cpu_limit:
                type: number
                nullable: true
                description: The cpu limit.
              env_vars:
                type: array
                description: A list of environment variables for this Engine Version.
                items:
                  type: object
                  properties:
                    value:
                      type: string
                      description: The value for this environment variable.
                    container_var_name:
                      type: string
                      description: >-
                        The name used to access this environment variable within
                        the container.
          scaling_specification:
            type: object
            description: |
              The Scaling Specification properties.
            properties:
              minimum_active:
                type: integer
                description: The min_instances value of the Engine Version.
              maximum_active:
                type: integer
                description: The max_instances value of the Engine Version.
    update-deployment-internal:
      type: object
      properties:
        engine_version:
          type: object
          description: |
            The Engine Version that is to be updated.
          properties:
            status:
              type: string
              enum:
                - SUBMITTED
                - GENERATING_TOKEN
                - AWAITING_IMAGE_UPLOAD
                - PREPARING
                - AVAILABLE
                - FAILED
                - RETIRED
                - RETIRING
              description: >
                The status of an Engine Version describes its lifecycle as
                follows.

                - `SUBMITTED` - The Engine Version is new.

                - `PREPARING` - The Engine Version is waiting for a backend
                asynchronous process to complete.

                - `AVAILABLE` - The Engine Version is available for use.

                - `FAILED` - The Engine Version failed in a process and can not
                be used.

                - `RETIRING` - The Engine Version is being retired and can not
                be used.

                - `RETIRED` - The Engine Version has been retired and can no
                longer be used.

                - `GENERATING_TOKEN` - If `acr_token` was chosen as the
                ingestion_type, the Engine Version is waiting for the

                token to be generated. After the token is generated, the
                information will be given in the `container_upload` object.

                - `AWAITING_IMAGE_UPLOAD` - The Engine Version is waiting for
                the Owner to upload their image using the information

