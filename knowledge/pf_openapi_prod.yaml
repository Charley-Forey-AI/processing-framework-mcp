info:
  version: 1.0.0
  title: Trimble Cloud Processing Framework
  termsOfService: https://www.trimble.com/Support/Terms_of_Sale.aspx
  license:
    name: TBD
    url: https://trimble.com
  contact:
    email: cloudplatform_support@trimble.com
    url: https://sites.google.com/trimble.com/cloudplatform/home
  x-logo:
    url: >-
      https://assets2.brandfolder.io/bf-boulder-prod/s999j63hksm4btmk9fx2t4s/v/1006286346/original/TrimbleR-Horiz-RGB-Blue.svg
  description: >
    # Overview


    The Processing Framework is the Trimble Cloud Platform system for
    constructing Operations, Procedures, and

    Executions for workflow processing. Processing Framework supports Operation
    development through self-serviceable 

    Engines and Deployments, where an Engine is a container image for an
    Operation's underlying code and a Deployment 

    is a specification for how to deploy and scale an Engine in the cloud.
    Processing Framework is available in 

    multiple regions and cloud providers, the current list of available regions
    is: ['aws-us1', 'azure-us1', 'eu-azure'].

    Regions are defined on an Engine, a Deployment can then specify which
    regions to deploy an Engine. A Deployment's 

    region list must be a subset of the attached Engine's region list.
    Operations are then created for Deployments and 

    inherit the regions. This is further propagated to Procedures where the
    available regions are programmatically determined 

    by the common regions amongst all Operations in the Procedure. All
    Operations in a Procedure must have at least 1 shared

    region.



    ## Users


    Users are central to object scoping within the Processing Framework API.
    Users represent individuals and client

    application entities that have their own set of Operations and Procedures.



    When making a call to the API, the requester is authenticated as a User in
    the system and all actions are implicitly

    performed as that User. As a baseline, that Users will have access to any
    Operations and Procedures that have been

    created by them, created by other Users but shared with them, or those that
    have been made public.



    ## Scoping and Availability


    When performing a 'list' action upon a resource, such as Operations or
    Procedures, the resulting set is constructed

    as follows:



    - The items are listed in the order of creation time from newest to oldest.


    - The items listed must be owned by the requesting User directly, shared
    with the requesting User, or be public.



    ## Sharing


    Operations and Procedures, when created by a User, can be shared selectively
    with other Users in the system using

    the name associated with the account.



    Only the original owner of a Operation can alter it. A User who has had an
    Operation shared with them can use it to

    construct Procedures. They also have the option of "cloning" the Operation
    in order to have their own version to

    directly modify.



    Only the original owner of a Procedure can alter it. A User who has had a
    Procedure shared with them can perform an

    execution on that Procedure, or clone it just as with a shared Operation.



    ## Publishing


    Sharing is selective, but publishing is like sharing an Operation or
    Procedure with every User in the system who

    currently exists or will exist in the future. The same rules of shared
    Operations and Procedures apply to published

    Operations and Procedures.



    ## Versions


    Operations and Procedures can have multiple versions. New versions are
    created when an Operation or Procedure is

    cloned and modified or when an Operation or Procedure is manually created
    based on an existing object. The `version`

    and `identifier` are unique for every resource. The UUID (`id`) is used to
    access the unique resource. New versions

    of an Operation or Procedure should be created when functionality is
    enhanced but the original Operation's purpose

    or the Procedure's workflow is the same. When there are multiple versions of
    an object, use the highest version.


    As an example, it would be appropriate to create a new version of the
    _compress_files_ operation if a new supported

    compression type, such as _.rar_ was added to that operation. However, if
    you wished to change the function of the _compress_files_

    Operation to copy files instead, it would be appropriate to create a new
    Operation with the _copy_files_ identifier

    instead of increasing the _compress_files_ Operation version number, since
    the underlying functionality & purpose of

    the Operation has changed.



    ## Operation Lifecycle


    Before an Operation is approved, it is in a MUTABLE state, which means it
    can be modified or deleted freely. Once an

    Operation is approved, it is no longer MUTABLE and can only be removed
    through the retirement process. An approved

    Operation cannot become unapproved and returned to a MUTABLE state.
externalDocs:
  description: Trimble Cloud User Documentation.
  url: https://docs.trimblecloud.com/
tags:
  - name: Operations
    description: >

      The following is a compiled list of actions that can be performed on
      Operations.

      Operations are the basic building blocks of processing. An Operation
      exposes a single function of a backend

      Processing Engine such as reprojection, writing a file to data ocean, or
      transforming one type of data into

      another.
  - name: Procedures
    description: >

      The following is a compiled list of actions that can be performed on
      Procedures.

      A Procedure defines a processing workflow in the Processing Framework. It
      encapsulates a set of Operations (one or

      multiple), describes the workflow's parameters, and defines parameter and
      input/output mappings between

      Operations. Procedures are submitted for processing through Executions
      (also known as Procedure Executions).


      ## Procedure Logic


      The Processing Framework supports logic that provides the capability of
      routing a data flow down desired paths

      based on conditions. This is implemented to fit alongside normal Operation
      chaining in the context of a Procedure

      definition and is managed by a special system-owned Operation called the
      Switcher.


      ### Reserved Words


      * `and`    logical and operation.

      * `or`     logical or operation.

      * `True`   boolean True value.

      * `False`  boolean False value.


      ### Comparison Operators


      * `<`    less than.

      * `<=`   less than or equal to.

      * `==`   equals.

      * `!=`   not equal to.

      * `>`    greater than.

      * `>=`   greater than or equal to.


      ### Literals

      Literal strings must be quoted. Since all this information is transferred
      in JSON documents, it is strongly

      recommended to use single quotes instead of double quotes because single
      quotes do not have to be escaped in JSON

      strings.


      ### Numbers

      Both decimal and whole numbers are supported. They must not be quoted.


      ### Parentheses

      Full support for parentheses to control priorities while resolving the
      statement.


      ### Variables

      Variables are unquoted strings. They must be resolvable or an error will
      be thrown. Variable names without a colon

      must be Execution or Procedure parameters.  Variable names with a colon
      must be Operation output parameters.



      ### Examples

      The simplest True statement:


      `"condition": "True"`


      The simplest False statement:


      `"condition": "False"`


      A simple statement with two conditions that must be true:


      `"condition": "ex_parameter >= 10 and proc_parameter == 'single'"`


      Controlling priorities with parentheses:


      `"condition": "a == True or (b == False and c != 16)"`
  - name: Executions
    description: >

      The following is a compiled list of actions that can be performed on
      Executions. An Execution, or 'Procedure

      Execution', represents a single request for processing data against a
      Procedure. Executions specify the source

      data and parameter values used in processing of a desired Procedure.


      The Processing Framework is integrated with the [Cloud Core Events
      Service](https://docs.trimblecloud.com/events/).

      Specifically, there is an event that can be subscribed to in order to
      listen for Execution Status changes. These

      events are scoped to the Application that you have subscribed with.


      #### Event Service Information for PF Execution Events

      ```

      namespace="com.trimble.tcp.processing",

      event="pf.exestatus",

      event_version="v1.0",

      ```


      Please follow the
      [instructions](https://docs.trimblecloud.com/events/home/consumer/overview/)
      provided by the

      Events Service team to register a Consumer to access your events in the
      Processing Framework. For convenience,

      they have also provided a sample

      [code
      snippet](https://docs.trimblecloud.com/events/sdk/python/consumer-tasks/consume-events/code-snippet/)
      to get

      you started.
  - name: Engines
    description: >

      Engines are low-level resource in the Processing Framework that represent
      a container image stored in the service.

      They provide the interface for how to define and configure a container
      with direct, optional, relation to how the

      code in the container is written. Properties such as environment variables
      or secrets are defined in the API

      model, but must be properly referenced in the associated code in the
      container. This is optional because not all

      use cases will require environment variables or secrets.


      The Engine and Deployment relationship provides the interface for you to
      manage your container images while

      minimizing the impact to your upstream clients that are consuming
      Operations from your Engine.
  - name: Deployments
    description: >

      The following is a compiled list of actions that can be performed on
      Deployments. The concept of Deployments

      provides the configurable interface for the following topics: 


      * Operation to Engine Image relationship

      * Scaling 

      * Compute resource definition


      A Deployment allows the Operation author to seamlessly transition from one
      Container Image tag (Engine) to another

      with a single update to the `deployment.active_engine` property. This
      means that if a bug is fixed or a backward

      compatible enhancement is made, a Deployment owner can push that change
      out to all consumers of the Operation

      without requiring any change from the consumer side of things.


      The interface also offers the ability to configure scaling requirements
      on-demand as well. During development,

      you may set your `deployment.scaling.min` to a value of 1 so that while
      testing an Active Engine, there would be

      no wait time for the Deployment to be running. Then it may be desired to
      set the minimum to 0 if your workload

      does not need a Deployment running at all times.
  - name: Deployment Secrets
    description: >

      The following is a compiled list of actions that can be performed on
      Deployment Secrets.  Deployment Secrets

      represent sensitive information that is mounted on an Engine container.
      Secrets are an optional capability that

      are used to provide a means of keeping sensitive information out of built
      container images. A common use case that

      this interface supports is the ability to update sensitive information if
      you need to rotate credentials for

      example.


      A Secret is a key, value pair.  These values can be mounted to an Engine
      container as either an environment

      variable or a file. See the [Deployments](#Deployments) schema for more
      information.


      See our [implementation
      documentation](https://docs.trimblecloud.com/processing/Content/Processing/concepts/pf-engine-tdsplitengine.htm)

      for an example of how an environment variable can be accessed.
  - name: Workspaces
    description: >

      The following is a compiled list of actions that can be performed on
      Workspaces. Workspaces represent FME 

      Workspaces that can be run within the Processing Framework. Once a
      Workspace is created, a corresponding 

      Operation must be made in order to use it. See [Operations](#Operations)
      for more information.


      See our [implementation documentation](#TODO) for more information on
      implementing Workspaces. 
  - name: Execution Schedules
    description: >

      The following is a compiled list of actions that can be performed on
      Execution Schedules. Execution Schedules 

      allow users to automate the execution of procedures on a defined schedule.
      This can be either a one-time future 

      execution or a recurring execution based on a cron expression.


      Execution Schedules can be created, retrieved, and updated through the
      API. Additionally, actions such as pausing,

      resuming, and retiring can be performed using the action parameter when
      updating a schedule.


      When an execution is triggered by a schedule, it uses the same parameters
      and settings that were defined when

      the schedule was created.
servers:
  - url: https://cloud.dev.api.trimblecloud.com/Processing/testapi/1
    description: Development (Internal use only)
  - url: https://cloud.stage.api.trimblecloud.com/Processing/api/1
    description: Staging
  - url: https://cloud.api.trimble.com/Processing/api/1
    description: Production
paths:
  /api/operations:
    post:
      tags:
        - Operations
      summary: Create Operation
      description: |
        Creates an Operation object based on the scope of the requesting User.

        Access Level Requirement: **BASE**

        This route also supports the `.json` extension.
      operationId: create-operation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-operation'
            examples:
              Create an Operation:
                $ref: '#/components/examples/create-operation-data-ocean-read-file'
        description: |
          Client Operation Payload
      responses:
        '201':
          description: Created
          headers:
            tpaas-request-id:
              $ref: '#/components/headers/api-gateway-request-id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/created-operation'
              examples:
                Created Operation:
                  $ref: '#/components/examples/created-operation'
        '401':
          $ref: '#/components/responses/401'
        '422':
          $ref: '#/components/responses/422'
    get:
      tags:
        - Operations
      summary: List Operations
      operationId: get-operations
      description: |
        Gets Operation objects that the user has access to view.

        Access Level Requirement: **BASE**

        This route also supports the `.json` extension.
      parameters:
        - $ref: '#/components/parameters/engine'
        - $ref: '#/components/parameters/deployment-identifier'
        - $ref: '#/components/parameters/procedure-uuid'
        - $ref: '#/components/parameters/identifier'
        - $ref: '#/components/parameters/status'
        - $ref: '#/components/parameters/execution-status'
        - $ref: '#/components/parameters/region'
        - $ref: '#/components/parameters/per-page'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: OK
          headers:
            tpaas-request-id:
              $ref: '#/components/headers/api-gateway-request-id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get-operations'
              examples:
                Get Operations:
                  $ref: '#/components/examples/get-operations'
        '401':
          $ref: '#/components/responses/401'
  /api/operations/{operation-id}:
    get:
      tags:
        - Operations
      summary: Get an Operation by ID
      operationId: get-operation-by-id
      description: |
        Get an Operation object by ID.

        Access Level Requirement: **BASE**

        This route also supports the `.json` extension.
      parameters:
        - $ref: '#/components/parameters/operation-id'
      responses:
        '200':
          description: OK
          headers:
            tpaas-request-id:
              $ref: '#/components/headers/api-gateway-request-id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get-operation'
              examples:
                Get Operation:
                  $ref: '#/components/examples/get-operation'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
    put:
      tags:
        - Operations
      summary: Update Operation
      operationId: update-operation
      description: >
        Update an Operation object by ID. See parameters for possibilities on
        what can be updated.

        Note: An Operation can only be updated when it is in a MUTABLE state
        (prior to approval). The following fields are

        exceptions: shared_with attribute and state-related fields (some
        PUT-based endpoints alter the states of Operations,

        such as publish).


        Access Level Requirement: **BASE**


        This route also supports the `.json` extension.
      parameters:
        - $ref: '#/components/parameters/operation-id'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/update-operation'
            examples:
              Update Data Ocean Read Operation:
                $ref: '#/components/examples/update-operation-data-ocean-read-file'
        description: >
          The payload that contains the Operation properties with their updated
          values.
        required: true
      responses:
        '200':
          description: OK
          headers:
            tpaas-request-id:
              $ref: '#/components/headers/api-gateway-request-id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/updated-operation'
              examples:
                Updated Data Ocean Read Operation:
                  $ref: '#/components/examples/updated-operation'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
    delete:
      tags:
        - Operations
      summary: Delete Operation
      operationId: delete-operation
      description: >
        Delete an Operation by ID. Note that this action can only be performed
        on an Operation that is in a MUTABLE state.

        Once an Operation has been approved, it can only be decommissioned via
        retirement.


        Access Level Requirement: **BASE**


        This route also supports the `.json` extension.
      parameters:
        - $ref: '#/components/parameters/operation-id'
      responses:
        '204':
          description: No Content
          headers:
            tpaas-request-id:
              $ref: '#/components/headers/api-gateway-request-id'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
  /api/operations/{operation-id}/approve:
    put:
      tags:
        - Operations
      summary: Approve an Operation
      operationId: approve-operation
      description: >
        Approve an Operation for use in Procedures. This locks the Operation
        into an unchangeable state with the exception

        of its shared_with attribute.


        Access Level Requirement: **BASE**


        This route also supports the `.json` extension.
      parameters:
        - $ref: '#/components/parameters/operation-id'
      responses:
        '200':
          description: OK
          headers:
            tpaas-request-id:
              $ref: '#/components/headers/api-gateway-request-id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/updated-operation'
              examples:
                Approved Data Ocean Read Operation:
                  $ref: '#/components/examples/approved-operation'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
  /api/operations/{operation-id}/clone:
    put:
      tags:
        - Operations
      summary: Clone an Operation
      operationId: clone-operation
      description: >
        Make an exact copy of a given Operation within the requesting User's
        scope, bump its version, and assign direct

        ownership to requesting User.


        The new Operation will also be in a fresh, unapproved state (MUTABLE and
        NOT_READY) regardless of the statuses of

        the Operation that was cloned.


        Access Level Requirement: **BASE**


        This route also supports the `.json` extension.
      parameters:
        - $ref: '#/components/parameters/operation-id'
      responses:
        '200':
          description: OK
          headers:
            tpaas-request-id:
              $ref: '#/components/headers/api-gateway-request-id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/updated-operation'
              examples:
                Cloned Data Ocean Read Operation:
                  $ref: '#/components/examples/cloned-operation'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
  /api/operations/{operation-id}/publish:
    put:
      tags:
        - Operations
      summary: Publish an Operation
      operationId: publish-operation
      description: >
        Publish an Operation so that all Users have access to it. This action is
        effectively the same as sharing the

        Operation with everyone simultaneously. This action is irreversible.


        Access Level Requirement: **BASE**


        This route also supports the `.json` extension.
      parameters:
        - $ref: '#/components/parameters/operation-id'
      responses:
        '200':
          description: OK
          headers:
            tpaas-request-id:
              $ref: '#/components/headers/api-gateway-request-id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/updated-operation'
              examples:
                Published Data Ocean Read Operation:
                  $ref: '#/components/examples/published-operation'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
  /api/operations/{operation-id}/retire:
    put:
      tags:
        - Operations
      summary: Retire an Operation
      operationId: retire-operation
      description: >
        Retire an Operation from use. This moves its status from EXECUTABLE to
        RETIRED. An Operation can only be retired if

        all associated Procedure definitions have also been retired.


        Retiring an Operation is a non-reversible action. Once an Operation has
        been retired, it cannot be brought back into

        an approved/executable state.


        Access Level Requirement: **BASE**


        This route also supports the `.json` extension.
      parameters:
        - $ref: '#/components/parameters/operation-id'
      responses:
        '200':
          description: OK
          headers:
            tpaas-request-id:
              $ref: '#/components/headers/api-gateway-request-id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/updated-operation'
              examples:
                Retired Data Ocean Read Operation:
                  $ref: '#/components/examples/retired-operation'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
  /api/procedures:
    post:
      tags:
        - Procedures
      summary: Create a Procedure
      operationId: create-procedure
      description: >
        Create a new Procedure in the system. For more information, see the
        Procedure definition guide in the

        [User
        Docs](https://docs.trimblecloud.com/processing-framework/content/how-to-guides/data-transformation/procedure/).


        Access Level Requirement: **BASE**


        This route also supports the `.json` extension.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-procedure'
            examples:
              Create a Procedure:
                $ref: '#/components/examples/create-procedure-data-ocean-read-file'
              Create a Procedure with a Switcher:
                $ref: '#/components/examples/create-procedure-with-switcher'
        description: |
          Client Procedure Payload
      responses:
        '201':
          description: Created
          headers:
            tpaas-request-id:
              $ref: '#/components/headers/api-gateway-request-id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/created-procedure'
              examples:
                Created Procedure:
                  $ref: '#/components/examples/created-procedure'
                Created Procedure with Switcher:
                  $ref: '#/components/examples/created-procedure-with-switcher'
        '401':
          $ref: '#/components/responses/401'
        '422':
          $ref: '#/components/responses/422'
    get:
      tags:
        - Procedures
      summary: List Procedures
      operationId: get-procedures
      description: |
        Gets Procedure objects that the user has access to view.

        Access Level Requirement: **BASE**

        This route also supports the `.json` extension.
      parameters:
        - $ref: '#/components/parameters/public'
        - $ref: '#/components/parameters/operation-uuid'
        - $ref: '#/components/parameters/identifier'
        - $ref: '#/components/parameters/status'
        - $ref: '#/components/parameters/execution-status'
        - $ref: '#/components/parameters/region'
        - $ref: '#/components/parameters/per-page'
        - $ref: '#/components/parameters/page'
      responses:
        '200':
          description: OK
          headers:
            tpaas-request-id:
              $ref: '#/components/headers/api-gateway-request-id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get-procedures'
              examples:
                Get Procedures:
                  $ref: '#/components/examples/get-procedures'
        '401':
          $ref: '#/components/responses/401'
  /api/procedures/{procedure-id}:
    get:
      tags:
        - Procedures
      summary: Get a Procedure by ID
      operationId: get-procedure-by-id
      description: |
        Get a Procedure object by ID.

        Access Level Requirement: **BASE**

        This route also supports the `.json` extension.
      parameters:
        - $ref: '#/components/parameters/procedure-id'
        - $ref: '#/components/parameters/procedure-view'
      responses:
        '200':
          description: OK
          headers:
            tpaas-request-id:
              $ref: '#/components/headers/api-gateway-request-id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get-procedure'
              examples:
                Get Procedure:
                  $ref: '#/components/examples/get-procedure'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
    put:
      tags:
        - Procedures
      summary: Update an Existing Procedure
      operationId: update-procedure
      description: >
        Update a Procedure object by ID. See parameters for possibilities on
        what can be updated.


        A Procedure can only be updated after its creation but before its
        approval. i.e. It must have a status of MUTABLE

        and an execution_status of NOT_READY. Once a Procedure has been
        approved, only its shared_with, documentation_url,

        and default_region attributes can be updated.


        Access Level Requirement: **BASE**


        This route also supports the `.json` extension.
      parameters:
        - $ref: '#/components/parameters/procedure-id'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/update-procedure'
            examples:
              Update Data Ocean Read Procedure:
                $ref: '#/components/examples/update-procedure-data-ocean-read-file'
        description: >
          The payload that contains the Procedure properties with their updated
          values.
        required: true
      responses:
        '200':
          description: OK
          headers:
            tpaas-request-id:
              $ref: '#/components/headers/api-gateway-request-id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/updated-procedure'
              examples:
                Updated Data Ocean Read Procedure:
                  $ref: '#/components/examples/updated-procedure'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'
    delete:
      tags:
        - Procedures
      summary: Delete a Procedure
      operationId: delete-procedure
      description: |
        Delete a Procedure by ID.

        Access Level Requirement: **BASE**

        This route also supports the `.json` extension.
      parameters:
        - $ref: '#/components/parameters/procedure-id'
      responses:
        '202':
          description: Accepted
          headers:
            tpaas-request-id:
              $ref: '#/components/headers/api-gateway-request-id'
