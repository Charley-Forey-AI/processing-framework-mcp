  /api/procedures/{procedure-id}/retire:
    put:
      tags:
        - Procedures
      summary: Retire a Procedure
      operationId: retire-procedure
      description: >
        Retire a Procedure from use. This moves its status from EXECUTABLE to
        RETIRED. A Procedure can only be retired if no

        associated Procedure Executions are active.


        Retiring a Procedure is a non-reversible action. Once a Procedure has
        been retired, it cannot be brought back into

        an approved/executable state.


        For more information, see the Procedure definition guide in the

        [User
        Docs](https://docs.trimblecloud.com/processing-framework/content/how-to-guides/data-transformation/procedure/).


