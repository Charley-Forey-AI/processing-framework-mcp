    Executions:
      type: object
      properties:
        id:
          readOnly: true
          type: string
          description: >
            The unique identifier for the Execution, read-only and assigned at
            creation time. Used to perform actions on

            specific Executions through the API.
        status:
          readOnly: true
          type: string
          enum:
            - CREATED
            - ORDERED
            - EXPIRED
          description: >
            LEGACY ATTRIBUTE - The status of an Execution describes its
            lifecycle as follows.
                - `CREATED` Designates the Execution as freshly created and able to be modified.
                - `ORDERED` Execution has been submitted for processing.
                - `EXPIRED` Execution has been processed and its resources have been cleaned up.
        execution_status:
          readOnly: true
          type: string
          enum:
            - NOT_READY
            - QUEUED
            - EXECUTING
            - FAILED
            - FINISHED
          description: >
            LEGACY ATTRIBUTE - The execution_status of an Execution describes
            its processing status.
              - `NOT_READY` - The Execution has not been started yet.
              - `QUEUED` - Execution has been submitted for processing and is waiting in a processing queue.
              - `EXECUTING` - The decider has handled the Execution and is waiting for Operations to be processed.
              - `FAILED` - Processing of one or more Operations failed.
              - `FINISHED` - Processing has completed.
        progress:
          readOnly: true
          type: string
          enum:
            - UNSUBMITTED
            - SUBMITTED
            - WAITING
            - NOT_READY
            - QUEUED
            - EXECUTING
            - FAILED
            - FINISHED
          description: >
            The execution_status of an Execution describes its processing
            status.
              - `UNSUBMITTED` - The execution was not successfully submitted to SWF.
              - `SUBMITTED` - The execution was successfully submitted to SWF for handling by the Decider.
              - `WAITING` - The underlying procedure is locked, causing the execution to wait for the procedure to be
                unlocked.
              - `QUEUED` - Execution has been submitted for processing and is waiting in a processing queue.
              - `EXECUTING` - The decider has handled the Execution and is waiting for operations to be processed.
              - `FAILED` - Processing of one or more Operations failed.
              - `FINISHED` - Processing has completed.
        procedure_identifier:
          type: string
          description: |
            The identifier of the target Procedure for Execution.
        procedure_version:
          type: integer
          description: |
            The version of the target Procedure for Execution.
        procedure_id:
          type: string
          description: The unique identifier of the target Procedure.
        region:
          type: string
          description: >
            Region name for the Execution to run in. Must be a name seen in the
            Procedure's `regions` list. If not provided,

            then `default_region` of the Procedure is used.


            Executions created before the Regions feature was added will not
            have this value.    
        created_at:
          readOnly: true
          type: string
          description: |
            Timestamp for the Execution's creation.
        completed_at:
          readOnly: true
          type: string
          nullable: true
          description: |
            Timestamp for Execution's completion, if applicable.
    get-executions:
      type: object
      properties:
        items:
          type: array
          description: |
