  /api/executions/engine_logs:
    post:
      tags:
        - Executions
      summary: Get Execution Logs
      operationId: execution-engine-logs
      description: >
        Obtain log contents for a given Execution via Data Ocean. Successful
        requests to this endpoint will create an

        Execution that is responsible for delivering the logs created by
        Operations defined in the specified Procedure 

        Execution to the client's specified Data Ocean location. It is important
        to understand that a Procedure Execution

        may produce one or more log files so you may have to traverse the Data
        Ocean output path to discover all of the

        files that were generated by the specified Execution.


        The requesting client must be the rightful owner of the Procedure
        Execution to retrieve these logs. If a client does

        not own the Execution, the logs can not be requested.


        The logs come in two parts: library log output and executable log
        output. The log contents will have sensitive

        information redacted from them, such as IP addresses or filepaths, but
        will still contain the bulk of raw

        information necessary to assist in troubleshooting an Execution.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-execution-engine-log'
            examples:
              Create an Execution to get Logs:
                $ref: '#/components/examples/create-execution-engine-log'
      responses:
        '201':
          description: Created
          headers:
            tpaas-request-id:
              $ref: '#/components/headers/api-gateway-request-id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/created-engine-log'
              examples:
                Created Execution:
                  $ref: '#/components/examples/created-engine-log'
        '401':
          $ref: '#/components/responses/401'
        '422':
          $ref: '#/components/responses/422'
