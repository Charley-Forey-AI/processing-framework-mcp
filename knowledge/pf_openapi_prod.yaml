  /api/execution_schedules:
    post:
      tags:
        - Execution Schedules
      summary: Create Execution Schedule
      description: >
        Creates a new Execution Schedule that will trigger procedure executions
        based on the specified schedule.

        Supports both one-time schedules and recurring schedules using cron
        expressions.


        Access Level Requirement: **BASE**


        This route also supports the `.json` extension.
      operationId: create-execution-schedule
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                execution_schedule:
                  $ref: '#/components/schemas/Execution-Schedule'
              required:
                - execution_schedule
            examples:
              Create One-Time Execution Schedule:
                value:
                  execution_schedule:
                    procedure_id: 801794aa-c7ef-4472-a168-9fa88f78632c
                    parameters:
                      input_path: input.txt
                      output_path: output.txt
                    schedule:
                      at_time: 2026/07/14 9:15:00
                    region: azure-us1
              Create Recurring Execution Schedule:
                value:
                  execution_schedule:
                    procedure_id: 801794aa-c7ef-4472-a168-9fa88f78632c
                    parameters:
                      input_path: input.txt
                      output_path: output.txt
                    schedule:
                      cron_expression: 0 */8 * * ? *
                      start_at: 2025/02/01 11:03:04
                      end_at: 2026/02/01 11:03:00
                    region: azure-us1
        description: |
          Client Execution Schedule Payload
      responses:
        '201':
          description: Created
          headers:
            tpaas-request-id:
              $ref: '#/components/headers/api-gateway-request-id'
          content:
