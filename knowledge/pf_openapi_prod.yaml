    Workspace-Slim:
      type: object
      properties:
        id:
          readOnly: true
          type: string
          description: >
            The unique identifier for the Workspace, read-only and assigned at
            creation time. Used to perform actions on

            specific Workspace through the API.
        trn:
          readOnly: true
          type: string
          description: >
            TRN unique identifier for the Workspace, read-only and assigned at
            creation time.  Acts as Metadata.
        identifier:
          type: string
          description: >
            A Workspace Identifier is unique within the system. The value must
            start with `[a-z]`, end with an alphanumeric

            value, and can only contain `[a-z, 0-9, '_', '-']`.
          minLength: 8
          maxLength: 256
        owner:
          readOnly: true
          type: string
          description: |
            Workspace owner.
        status:
          readOnly: true
          type: string
          enum:
            - PREPARING
            - UPDATING
            - AVAILABLE
            - RETIRED
            - FAILED
          description: >
            The status of a Workspace describes its lifecycle as follows.

            - `PREPARING` - This is a 'processing' state that is entered when a
            request to create a Workspace is received.
              This will block any other requests to modify the Workspace until the processing is complete. 
            - `UPDATING` - This is a 'processing' state that is entered anytime
            a request to modify the Workspace is
              received. This will block any other requests to modify the Workspace until the processing is complete.
            - `AVAILABLE` - The Workspace is available for use within an
            Operation.

            - `RETIRED` - The Workspace has been retired and can no not be used.

            - `FAILED` - The Workspace failed in a process and can not be used.
        deployment_identifier:
          type: string
          description: >
            The identifier of the Deployment that supports this Workspace. The
            Deployment provided must be tied to FME. 

            Currently, only `fme-2023-linux-v1-2023-0-0-3` is supported. Default
            value is `fme-2023-linux-v1-2023-0-0-3`.
        dataocean_path:
          type: string
          description: >
            The path to the DataOcean file that defines the FME Workspace. Path
            must be prefixed with owner's application ID.

            File must be of type `.fmw` or `.zip`.
        created_at:
          readOnly: true
          type: string
          description: |
            Timestamp for the Workspace's creation.
        updated_at:
          readOnly: true
          type: string
          description: |
            Timestamp for the Workspace's latest update.
    get-workspaces:
      type: object
      properties:
        items:
          type: array
          description: |
            The Workspaces in the response.
          items:
            $ref: '#/components/schemas/Workspace-Slim'
        current_page:
          type: integer
          description: |
            Current page of the Workspaces object list.
        per_page:
          type: integer
          description: |
            Number of Workspace objects returned per page.
        total_entries:
          type: integer
          description: >
            Total number of Workspace objects that the requesting user has
            access to.
        total_pages:
          type: integer
          description: >
            Total pages of the Workspace objects list. Calculated by dividing
            **total_entries** by **per_page**.
