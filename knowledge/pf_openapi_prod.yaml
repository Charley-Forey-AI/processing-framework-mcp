            container_upload:
              type: object
              description: >
                Initially empty, then updated by internal services. Contains
                information on how to upload a container.
              properties:
                acr_token:
                  type: object
                  description: |
                    Contains information relevant to an ACR upload token.
                  properties:
                    status:
                      type: string
                      enum:
                        - GENERATING
                        - AVAILABLE
                        - UNAVAILABLE
                        - IMAGE_RECEIVED
                      description: >
                        The status of an ACR token request describes its
                        lifecycle as follows.

                        - `GENERATING` - The ACR token has been requested and is
                        being generated.

                        - `AVAILABLE` - The ACR token is ready for use.

                        - `UNAVAILABLE` - The ACR token can not be used.

                        - `IMAGE_RECEIVED` - An image has been uploaded to ACR
                        using the token.
                    login_command:
                      type: string
                      description: >
                        The command to login to docker before tagging and
                        pushing an image. 
                    tag_command:
                      type: string
                      description: |
                        The command to run to correctly tag an image for upload.
                    push_command:
                      type: string
                      description: >
                        The command to run to correctly push an image after it
                        has been tagged.
            container_image:
              type: object
              description: |
                Contains tasklist info and image URI.
              additionalProperties:
                type: object
                description: >
                  There will be a dictionary for each region available to this
                  Engine Version.
                properties:
                  image:
                    type: string
                    description: The URI for this image's location in this region.
                  task_list:
                    type: string
                    description: >-
                      The SWF tasklist that will direct work to the paired repo
