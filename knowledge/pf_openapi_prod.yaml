            **total_entries** by **per_page**.
    Engine:
      type: object
      properties:
        id:
          readOnly: true
          type: string
          description: >
            The unique identifier for the Engine, read-only and assigned at
            creation time. Used to perform actions on

            specific Engines through the API.
        name:
          type: string
          description: |
            Engine name. Metadata only.
          maxLength: 64
        identifier:
          type: string
          description: >
            Engine identifier, unique within the system. It must 32 characters
            or less, start with `a-z`, end with an alphanumeric value, and can

            only contain the characters `a-z`, `0-9`, and `-`.
          minLength: 2
          maxLength: 32
        tag:
          type: string
          description: >
            An Engine tag must start with `[a-z]`, end with an alphanumeric
            value, and can only contain `[a-z, 0-9, '-']`.
          minLength: 1
          maxLength: 16
        owner:
          readOnly: true
          type: string
          description: |
            Engine owner.
        description:
          type: string
          description: |
            A description of the Engine and its function.
        status:
          readOnly: true
          type: string
          enum:
            - SUBMITTED
            - GENERATING_TOKEN
            - AWAITING_IMAGE_UPLOAD
            - PREPARING
            - AVAILABLE
            - RETIRING
            - RETIRED
            - FAILED
          description: >
            The status of an Engine describes its lifecycle as follows.

            - `SUBMITTED` - The Engine object has been created in our system but
            the Cloud resource creation has not begun.

            - `GENERATING_TOKEN` - The Cloud resource creation has successfully
            begun and the system is generating your credentials.

            - `AWAITING_IMAGE_UPLOAD` - Your credentials have successfully
            generated and the system is waiting for you to upload your container
            image using the provided commands.

            - `PREPARING` - This is a 'processing' state that is entered anytime
            a request to modify the Engine is received. This will block any
            other requests to modify the Engine until the processing is
            complete. 

            - `AVAILABLE` - The container image has successfully been ingested
            into our system and this Engine is now ready to be referenced in a
            Deployment.

            - `FAILED` - The Engine failed in a process and can not be used.

            - `RETIRING` - The Engine is being retired and can not be used.

            - `RETIRED` - The Engine has been retired and can no not be used.
        status_message:
          readOnly: true
          type: array
          items:
            type: string
          description: >
            The status message of an Engine explains the status of image
            ingestion.

            - The system is generating an ACR token.

            - The system is waiting for you to upload your container image using
            the commands found in container_upload.

            - Processing the update request...

            - Retiring Engine, the container image is being deleted from cloud
            repositories.

            - Ingesting Engine image.

            - Engine ingestion succeeded.

            - Engine ingestion failed for an unknown reason.

            - Container image must not run as root. Change the user to a
            non-zero integer.

            - Container image must not run as root. Change the user to a
            non-administrator role.

            - Container image is missing at least one required label:
            [os-patching, software-patching]

            - Container image has at least one invalid label: []

            - Container image failed to run.

            - Container image has been deleted. This Engine is no longer
            functional.
        ingestion_type:
          type: string
          enum:
            - acr_token
          description: >
            The method of uploading a container image into our system. Currently
            the only option is a temporary ACR token upload.

            - `acr_token` - A unique and temporary ACR token will be generated
            on your behalf so that you may upload a container image into our
            system. The API will provide a set of commands in the
            'container_upload' object that will allow you login and upload your
            container image.
        os:
          type: string
          enum:
            - linux
            - windows
          description: |
            Which OS for the Engine to use.
            - `linux` - Create a linux Engine.
            - `windows` - Create a windows Engine.
        os_build:
          type: string
          enum:
            - 10.0.17763
            - 10.0.20348
          description: >
            Specify which OS build to use. This is a required parameter for
            Windows Engines only. At this time, the Engines

            API directly supports Windows Server 2019 (`10.0.17763`), and can
            optionally support Windows Server 2022

            (`10.0.20348`). If the latter is needed, please contact the team for
            assistance.

            [Windows Server
            2019](https://learn.microsoft.com/en-us/windows/release-health/supported-versions-windows-client#enterprise-and-iot-enterprise-ltsbltsc-editions)

            [Windows Server
            2022](https://support.microsoft.com/en-gb/topic/windows-server-2022-update-history-e1caa597-00c5-4ab9-9f3e-8212fe80b2ee)
        env_vars:
          type: array
          description: >
            Environment variables that are stored and ingested into the Engine's
            container as literal plain-text values.
          items:
            type: object
            properties:
              value:
                type: string
                description: The value for this environment variable.
              container_var_name:
                type: string
                description: >
                  The name of the environment variable inside the container (The
                  Engine's source code.) This field supports

                  only alphanumeric, underscores, and hyphens and must be less
                  than 128 characters.
                maxLength: 128
        secret_variables:
          type: array
          items:
            type: object
            properties:
              secret_identifier:
                type: string
                description: >
                  The expected identifier of a Deployment Secret. A Deployment
                  that wishes to reference this Engine should have a Deployment
                  Secret with an identifier that matches this value.
              container_var_name:
                type: string
                description: >
                  The name of the environment variable inside the container (The
                  Engine's source code.)
        secret_files:
          type: array
          items:
            type: object
            properties:
              secret_identifier:
                type: string
                description: >
                  The expected identifier of a Deployment Secret. A Deployment
                  that wishes to reference this Engine should have a Deployment
                  Secret with an identifier that matches this value.
              container_file_path:
                type: string
                description: >
                  The file path of an ingested Deployment Secret file. (i.e. the
                  desired location to store a license file in the container)
        container_upload:
          readOnly: true
          type: object
          description: >
            Initially empty, then updated by internal services. Contains
            information on how to upload a container.

            Hidden after the container has been uploaded.
          properties:
            acr_token:
              type: object
              description: |
                Contains information relevant to an ACR upload token.
              properties:
                status:
                  type: string
                  enum:
                    - GENERATING
                    - AVAILABLE
                    - UNAVAILABLE
                    - IMAGE_RECEIVED
                  description: >
                    The status of an ACR token request describes its lifecycle
                    as follows.

                    - `GENERATING` - The ACR token has been requested and is
                    being generated.

                    - `AVAILABLE` - The ACR token is ready for use.

                    - `UNAVAILABLE` - The ACR token can not be used.

                    - `IMAGE_RECEIVED` - An image has been uploaded to ACR using
                    the token. At this point this object is no longer readable.
                login_command:
                  type: string
                  description: >
                    The command used to login to docker before tagging and
                    pushing an image.
                tag_command:
                  type: string
                  description: |
                    The command used to tag an image for upload.
                push_command:
                  type: string
                  description: |
                    The command used to push a tagged image into our system.
        regions:
          type: array
          items:
            type: string
          description: >
            The location(s) this resource can run in. Regions are a combination
            of two key pieces of information - the Cloud

            Provider and the specific region from that Provider. Possible
            regions: `[azure-us1]` 
        public:
          type: boolean
          description: >
            The state of the Engine's publication. Publishing Engines is not
            currently supported.
        created_at:
          readOnly: true
          type: string
          description: |
            Timestamp for the Engine's creation.
        updated_at:
          readOnly: true
          type: string
          description: |
            Timestamp for the Engine's latest update.
