name: mcp-ci

on:
  push:
    paths:
      - "mcp/**"
      - ".github/workflows/mcp-ci.yml"
  pull_request:
    paths:
      - "mcp/**"
      - ".github/workflows/mcp-ci.yml"

jobs:
  test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Tests
        run: npm run test

      - name: Build
        run: npm run build
